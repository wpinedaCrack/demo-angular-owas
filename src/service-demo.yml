name: Build and deploy Angular SSR to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm ci

      - name: Build Angular SSR (producción)
        run: npm run build

      - name: Copiar package.json al dist
        run: cp package.json dist/lab-frontdoor-angular/

      - name: Instalar dependencias de producción en dist
        run: |
          cd dist/lab-frontdoor-angular
          npm install --omit=dev

      - name: Empaquetar para deploy
        run: |
          cd dist/lab-frontdoor-angular
          zip -r ../../deploy.zip .

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: angular-app
          path: deploy.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Descargar artefacto
        uses: actions/download-artifact@v4
        with:
          name: angular-app

      - name: Deploy a Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'new-app-service-demo'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy.zip
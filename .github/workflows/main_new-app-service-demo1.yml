name: Build and deploy Node.js app to Azure Web App - new-app-service-demo1

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: npm install and build
        run: |
          npm install
          npm run build --if-present

      # Tests separados con ChromeHeadless (no bloquean el deploy si fallan)
      - name: Run tests
        run: npm run test -- --watch=false --browsers=ChromeHeadless
        continue-on-error: true

      # Solo subir el dist compilado + package.json (NO todo el repo)
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: dist/lab-frontdoor-angular

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D8173BB92A7A42C4B249A20E42239A48 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6A975FE2295F48BBB1F547942FF2948F }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D867FC24511B4827A95D03E78CDB9104 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'new-app-service-demo1'
          slot-name: 'Production'
          package: .
          startup-command: 'node /home/site/wwwroot/server/server.mjs'

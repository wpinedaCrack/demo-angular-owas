# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
name: Build and deploy Node.js app to Azure Web App - new-app-service-demo

"on":
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Instalar dependencias
        run: npm ci

      - name: Build Angular SSR
        run: npm run build

      - name: Copiar package.json al dist
        run: cp package.json dist/lab-frontdoor-angular/

      - name: Instalar solo dependencias de producción en dist
        run: |
          cd dist/lab-frontdoor-angular
          npm install --omit=dev

      - name: Empaquetar dist
        run: |
          cd dist/lab-frontdoor-angular
          zip -r ../../deploy.zip .

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_6B777E590C3D487EA9EDEBE1835EE325 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_26A4965931CF432ABA5FEB95E459F00B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D6332365D3F54D6DBE7A9022A4163C24 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'new-app-service-demo'
          slot-name: 'Production'
          package: deploy.zip
